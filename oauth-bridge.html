<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conectando…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0D0D; color: #F0F0F0;
      padding: 60px 30px; margin: 0; text-align: center;
      min-height: 100vh; box-sizing: border-box;
    }
    h1 { color: #A4FE73; font-size: 22px; margin: 0 0 12px; }
    p  { color: #888; font-size: 13px; line-height: 1.5; }
    .email { font-family: monospace; background: #161616; padding: 8px 14px; border-radius: 7px; display: inline-block; margin-top: 12px; color: #F0F0F0; }
    .bad { color: #FF4D4D; }
    .ok  { color: #A4FE73; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #2a2a2a; border-top-color: #A4FE73; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="content">
    <div class="spinner"></div>
    <h1>Conectando con Gmail…</h1>
    <p>Esta ventana se cierra automáticamente.</p>
  </div>
  <script>
    (function() {
      // Parse data from URL fragment (#key=value&...)
      var hash = window.location.hash.replace(/^#/, '');
      var params = {};
      hash.split('&').forEach(function(pair) {
        var kv = pair.split('=');
        if (kv[0]) params[kv[0]] = decodeURIComponent(kv[1] || '');
      });

      // NO limpiamos el hash todavía — el dashboard lo va a leer por polling.
      // El dashboard cierra esta ventana cuando termina.

      var success = params.success === '1' || params.success === 'true';
      var email = params.email || '';
      var refreshToken = params.refresh_token || '';
      var errMsg = params.error || '';

      // Update UI
      var content = document.getElementById('content');
      if (success && refreshToken) {
        content.innerHTML = '<h1 class="ok">✓ Gmail conectado</h1><p>Cuenta:</p><div class="email">' + email.replace(/[<>&"]/g, '') + '</div><p style="margin-top:24px;">Esta ventana se cierra automáticamente.</p>';
      } else {
        content.innerHTML = '<h1 class="bad">⚠ No se pudo conectar Gmail</h1><p>' + (errMsg || 'Error desconocido').replace(/[<>&"]/g, '') + '</p><p style="margin-top:20px;">Cerrá esta ventana e intentá de nuevo.</p>';
      }

      // Best-effort postMessage (window.opener suele ser null por COOP de Google,
      // pero si por algún motivo está disponible, esto acelera la comunicación).
      try {
        if (window.opener) {
          window.opener.postMessage({
            type: 'gmail_oauth_result',
            success: !!success,
            email: email,
            refresh_token: refreshToken,
            error: errMsg
          }, window.location.origin);
        }
      } catch(e) { /* opener no accesible — no problem, polling lo agarra */ }

      // Auto-close de respaldo (por si el dashboard no responde) a 30s.
      // El dashboard cierra esta ventana antes, normalmente.
      setTimeout(function() {
        try { window.close(); } catch(e) {}
      }, 30000);
    })();
  </script>
</body>
</html>
