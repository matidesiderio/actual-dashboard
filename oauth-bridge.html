<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conectando…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0D0D; color: #F0F0F0;
      padding: 60px 30px; margin: 0; text-align: center;
      min-height: 100vh; box-sizing: border-box;
    }
    h1 { color: #A4FE73; font-size: 22px; margin: 0 0 12px; }
    p  { color: #888; font-size: 13px; line-height: 1.5; }
    .bad { color: #FF4D4D; }
    .ok  { color: #A4FE73; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #2a2a2a; border-top-color: #A4FE73; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="content">
    <div class="spinner"></div>
    <h1>Procesando…</h1>
    <p>Esta ventana se cierra automáticamente.</p>
  </div>
  <script>
    (function() {
      // Parse fragment
      var hash = window.location.hash.replace(/^#/, '');
      var params = {};
      hash.split('&').forEach(function(p) {
        var kv = p.split('=');
        if (kv[0]) params[kv[0]] = decodeURIComponent(kv[1] || '');
      });
      var success = params.status === 'ok';
      var payload = {
        success: success,
        email: params.email || '',
        refresh_token: params.refresh_token || '',
        error: params.error || '',
        session: params.session || '',
        ts: Date.now()
      };

      // INSTANTÁNEO: escribir en localStorage (mismo origen que el dashboard → compartido)
      try {
        localStorage.setItem('actual_gmail_oauth_inbox', JSON.stringify(payload));
      } catch(e) {}

      // Limpiar el hash de la URL (seguridad: no dejar el token en el historial)
      try { history.replaceState(null, '', window.location.pathname); } catch(e) {}

      // UI
      var content = document.getElementById('content');
      if (success) {
        content.innerHTML = '<h1 class="ok">✓ Gmail conectado</h1><p>Volvé al dashboard. Esta ventana se cierra sola.</p>';
      } else {
        content.innerHTML = '<h1 class="bad">⚠ Algo falló</h1><p>' + (payload.error || 'Error desconocido').replace(/[<>&"]/g,'') + '</p>';
      }

      // Cerrar
      setTimeout(function() { try { window.close(); } catch(e) {} }, 1800);
    })();
  </script>
</body>
</html>
