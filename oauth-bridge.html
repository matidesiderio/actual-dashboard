<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conectando…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0D0D; color: #F0F0F0;
      padding: 60px 30px; margin: 0; text-align: center;
      min-height: 100vh; box-sizing: border-box;
    }
    h1 { color: #A4FE73; font-size: 22px; margin: 0 0 12px; }
    p  { color: #888; font-size: 13px; line-height: 1.5; }
    .bad { color: #FF4D4D; }
    .ok  { color: #A4FE73; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #2a2a2a; border-top-color: #A4FE73; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="content">
    <div class="spinner"></div>
    <h1>Procesando…</h1>
    <p>Esta ventana se cierra automáticamente.</p>
  </div>
  <script>
    (function() {
      var hash = window.location.hash.replace(/^#/, '');
      var status = 'ok';
      hash.split('&').forEach(function(p) {
        var kv = p.split('=');
        if (kv[0] === 'status') status = decodeURIComponent(kv[1] || 'ok');
      });
      var content = document.getElementById('content');
      if (status === 'ok') {
        content.innerHTML = '<h1 class="ok">✓ Gmail conectado</h1><p>Ya podés cerrar esta ventana. Volvé al dashboard.</p>';
      } else {
        content.innerHTML = '<h1 class="bad">⚠ Algo falló</h1><p>Cerrá esta ventana e intentá de nuevo desde el dashboard.</p>';
      }
      // El dashboard ya tiene los tokens (los recupera server-side por polling).
      // Esta ventana se cierra sola.
      setTimeout(function() { try { window.close(); } catch(e) {} }, 2000);
    })();
  </script>
</body>
</html>
